<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Game — Esport Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
  <script src="js/global.js" defer></script>
  <script src="js/hero-picker.js" defer></script>
  <script src="js/editgame.js" defer></script>
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
          <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
          <path d="M18 2H6v7a6 6 0 0 0 12 0V2z" />
        </svg>
      </div>
      <div>
        <div class="sidebar-logo-text">Esport</div>
        <div class="sidebar-logo-sub">MLBB Manager</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a href="index.html" class="nav-item" data-page="index.html">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Dashboard
      </a>
      <a href="competition.html" class="nav-item" data-page="competition.html">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
          <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
          <path d="M4 22h16"/>
          <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
          <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
          <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
        </svg>
        Competition
      </a>
      <a href="match.html" class="nav-item" data-page="match.html">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Match
      </a>
      <a href="train.html" class="nav-item" data-page="train.html">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Train
      </a>
      <a href="team.html" class="nav-item" data-page="team.html">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Tim
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle tema" type="button"></button>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-breadcrumb">
        <button class="menu-toggle" id="menuToggle" aria-label="Buka menu" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6"  x2="21" y2="6"  />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <a href="match.html" id="breadcrumbParent">Match</a>
        <span class="sep">/</span>
        <a id="breadcrumbGame" href="game.html">Game</a>
        <span class="sep">/</span>
        <span class="current" id="breadcrumbCurrent">Edit Game</span>
      </div>
      <div class="topbar-actions"></div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title" id="pageTitle">Edit Game</h1>
          <p class="page-sub" id="pageSub">Perbarui data game</p>
        </div>
        <a href="game.html" class="btn btn-secondary" id="backBtn">
          <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Kembali
        </a>
      </div>

      <div class="toast-container" id="toastContainer"></div>

      <!-- TAHAP 1 -->
      <section class="card" id="tahap1">
        <div class="card-header">
          <h2 class="section-title">Tahap 1: Informasi Game</h2>
        </div>
        <div class="form-stack">
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Game Number</label>
              <div class="form-input form-input-readonly" id="gameNumberDisplay">—</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="gameResult">Hasil Pertandingan</label>
              <select class="form-select" id="gameResult">
                <option value="win">WIN</option>
                <option value="lose">LOSE</option>
              </select>
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label" for="teamKills">Total Kills Tim</label>
              <input class="form-input" type="number" id="teamKills" placeholder="0" min="0" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="teamDeaths">Total Deaths Tim</label>
              <input class="form-input" type="number" id="teamDeaths" placeholder="0" min="0" required />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Durasi</label>
            <div class="inline-duration-fields">
              <span class="form-label">Menit</span>
              <input class="form-input input-inline-sm" type="number" id="gameDurationMin" placeholder="0" min="0" required />
              <span class="form-label">Detik</span>
              <input class="form-input input-inline-sm" type="number" id="gameDurationSec" placeholder="0" min="0" max="59" required />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" id="btnNextStep" type="button">Next</button>
          </div>
        </div>
      </section>

      <!-- TAHAP 2 -->
      <section class="card section-spaced hidden" id="tahap2">
        <div class="card-header">
          <h2 class="section-title">Tahap 2: Statistik Pemain</h2>
          <span class="badge badge-blue" id="roleProgress">0 / 5 role</span>
        </div>

        <div class="form-group">
          <label class="form-label">Pilih Role</label>
          <div class="radio-group" id="roleTabGroup">
            <label class="radio-item">
              <input type="radio" name="activeRole" value="jungler" checked />
              <span>Jungler</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="activeRole" value="roamer" />
              <span>Roamer</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="activeRole" value="midlaner" />
              <span>Mid Laner</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="activeRole" value="explaner" />
              <span>Exp Laner</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="activeRole" value="goldlaner" />
              <span>Gold Laner</span>
            </label>
          </div>
        </div>

        <div id="playerContainer">

          <!-- JUNGLER -->
          <article class="role-card" id="card-jungler">
            <div class="role-head"><span class="role-name">Jungler</span><span class="tag">Role 1</span></div>
            <select class="form-select select-player" required>
              <option value="" disabled selected>Pilih Pemain</option>
            </select>
            <!-- FIX Bug 2: tambah data-picker-input & data-picker-label agar hero-picker.js bisa init -->
            <div class="hero-picker-wrapper field-spacer-sm"
                 data-picker-input="hero_jungler"
                 data-picker-label="preview_hero_jungler">
              <button type="button" class="btn btn-secondary open-hero-picker">
                Pilih Hero
              </button>
              <span class="hero-picker-preview" id="preview_hero_jungler">—</span>
              <input type="hidden" id="hero_jungler" name="hero_jungler" />
            </div>
            <div class="grid-3 field-spacer-md">
              <input class="form-input input-kills"   type="number" placeholder="Kill"   min="0" required />
              <input class="form-input input-deaths"  type="number" placeholder="Death"  min="0" required />
              <input class="form-input input-assists" type="number" placeholder="Assist" min="0" required />
            </div>
            <div class="grid-2 field-spacer-sm">
              <input class="form-input input-kda"  type="number" placeholder="KDA" min="0" step="0.01" required />
              <input class="form-input input-gold" type="number" placeholder="Total Gold" min="0" required />
            </div>
          </article>

          <!-- ROAMER -->
          <article class="role-card hidden" id="card-roamer">
            <div class="role-head"><span class="role-name">Roamer</span><span class="tag">Role 2</span></div>
            <select class="form-select select-player" required>
              <option value="" disabled selected>Pilih Pemain</option>
            </select>
            <div class="hero-picker-wrapper field-spacer-sm"
                 data-picker-input="hero_roamer"
                 data-picker-label="preview_hero_roamer">
              <button type="button" class="btn btn-secondary open-hero-picker">
                Pilih Hero
              </button>
              <span class="hero-picker-preview" id="preview_hero_roamer">—</span>
              <input type="hidden" id="hero_roamer" name="hero_roamer" />
            </div>
            <div class="grid-3 field-spacer-md">
              <input class="form-input input-kills"   type="number" placeholder="Kill"   min="0" required />
              <input class="form-input input-deaths"  type="number" placeholder="Death"  min="0" required />
              <input class="form-input input-assists" type="number" placeholder="Assist" min="0" required />
            </div>
            <div class="grid-2 field-spacer-sm">
              <input class="form-input input-kda"  type="number" placeholder="KDA" min="0" step="0.01" required />
              <input class="form-input input-gold" type="number" placeholder="Total Gold" min="0" required />
            </div>
          </article>

          <!-- MID LANER -->
          <article class="role-card hidden" id="card-midlaner">
            <div class="role-head"><span class="role-name">Mid Laner</span><span class="tag">Role 3</span></div>
            <select class="form-select select-player" required>
              <option value="" disabled selected>Pilih Pemain</option>
            </select>
            <div class="hero-picker-wrapper field-spacer-sm"
                 data-picker-input="hero_midlaner"
                 data-picker-label="preview_hero_midlaner">
              <button type="button" class="btn btn-secondary open-hero-picker">
                Pilih Hero
              </button>
              <span class="hero-picker-preview" id="preview_hero_midlaner">—</span>
              <input type="hidden" id="hero_midlaner" name="hero_midlaner" />
            </div>
            <div class="grid-3 field-spacer-md">
              <input class="form-input input-kills"   type="number" placeholder="Kill"   min="0" required />
              <input class="form-input input-deaths"  type="number" placeholder="Death"  min="0" required />
              <input class="form-input input-assists" type="number" placeholder="Assist" min="0" required />
            </div>
            <div class="grid-2 field-spacer-sm">
              <input class="form-input input-kda"  type="number" placeholder="KDA" min="0" step="0.01" required />
              <input class="form-input input-gold" type="number" placeholder="Total Gold" min="0" required />
            </div>
          </article>

          <!-- EXP LANER -->
          <article class="role-card hidden" id="card-explaner">
            <div class="role-head"><span class="role-name">Exp Laner</span><span class="tag">Role 4</span></div>
            <select class="form-select select-player" required>
              <option value="" disabled selected>Pilih Pemain</option>
            </select>
            <div class="hero-picker-wrapper field-spacer-sm"
                 data-picker-input="hero_explaner"
                 data-picker-label="preview_hero_explaner">
              <button type="button" class="btn btn-secondary open-hero-picker">
                Pilih Hero
              </button>
              <span class="hero-picker-preview" id="preview_hero_explaner">—</span>
              <input type="hidden" id="hero_explaner" name="hero_explaner" />
            </div>
            <div class="grid-3 field-spacer-md">
              <input class="form-input input-kills"   type="number" placeholder="Kill"   min="0" required />
              <input class="form-input input-deaths"  type="number" placeholder="Death"  min="0" required />
              <input class="form-input input-assists" type="number" placeholder="Assist" min="0" required />
            </div>
            <div class="grid-2 field-spacer-sm">
              <input class="form-input input-kda"  type="number" placeholder="KDA" min="0" step="0.01" required />
              <input class="form-input input-gold" type="number" placeholder="Total Gold" min="0" required />
            </div>
          </article>

          <!-- GOLD LANER -->
          <article class="role-card hidden" id="card-goldlaner">
            <div class="role-head"><span class="role-name">Gold Laner</span><span class="tag">Role 5</span></div>
            <select class="form-select select-player" required>
              <option value="" disabled selected>Pilih Pemain</option>
            </select>
            <div class="hero-picker-wrapper field-spacer-sm"
                 data-picker-input="hero_goldlaner"
                 data-picker-label="preview_hero_goldlaner">
              <button type="button" class="btn btn-secondary open-hero-picker">
                Pilih Hero
              </button>
              <span class="hero-picker-preview" id="preview_hero_goldlaner">—</span>
              <input type="hidden" id="hero_goldlaner" name="hero_goldlaner" />
            </div>
            <div class="grid-3 field-spacer-md">
              <input class="form-input input-kills"   type="number" placeholder="Kill"   min="0" required />
              <input class="form-input input-deaths"  type="number" placeholder="Death"  min="0" required />
              <input class="form-input input-assists" type="number" placeholder="Assist" min="0" required />
            </div>
            <div class="grid-2 field-spacer-sm">
              <input class="form-input input-kda"  type="number" placeholder="KDA" min="0" step="0.01" required />
              <input class="form-input input-gold" type="number" placeholder="Total Gold" min="0" required />
            </div>
          </article>

        </div>

        <div class="step-actions">
          <button class="btn btn-secondary" id="btnBackStep"  type="button">Kembali ke Tahap 1</button>
          <button class="btn btn-primary"   id="btnSubmitAll" type="button">Simpan Perubahan</button>
        </div>
      </section>

    </main>
  </div>
</div>
</body>
</html>
