<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Game — TourneyPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div class="app-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2z" />
          </svg>
        </div>
        <div>
          <div class="sidebar-logo-text">TourneyPro</div>
          <div class="sidebar-logo-sub">MLBB Manager</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Navigation</div>

        <a href="index.html" class="nav-item" data-page="index.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          Dashboard
        </a>

        <a href="tournament.html" class="nav-item" data-page="tournament.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
          </svg>
          Tournament
        </a>

        <a href="match.html" class="nav-item" data-page="match.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10" />
            <polygon points="10 8 16 12 10 16 10 8" />
          </svg>
          Match
        </a>

        <a href="train.html" class="nav-item" data-page="train.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
          Train
        </a>

        <a href="team.html" class="nav-item" data-page="team.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Tim
        </a>
      </nav>

      <div class="sidebar-footer">
        <button
          class="theme-toggle"
          id="themeToggle"
          onclick="toggleTheme()"
          aria-label="Toggle tema"
          type="button"
        ></button>
      </div>
    </aside>

    <!-- =====================================================
         MAIN WRAPPER
         ===================================================== -->
    <div class="main-wrapper">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-breadcrumb">
          <button
            class="menu-toggle"
            id="menuToggle"
            aria-label="Buka menu"
            type="button"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="6"  x2="21" y2="6"  />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <span>Game</span>
          <span class="sep">/</span>
          <span class="current">Input Game</span>
        </div>
        <div class="topbar-actions"></div>
      </header>

      <!-- Page Content -->
      <main class="page-content">

        <!-- Page Header -->
        <div class="page-header">
          <div>
            <h1 class="page-title">Tambah Game</h1>
            <p class="page-sub">Catat game baru tim</p>
          </div>
          <a href="game.html" class="btn btn-secondary">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
              <polyline points="15 18 9 12 15 6" />
            </svg>
            Kembali
          </a>
        </div>

        <!-- Toast Container -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- =================================================
             TAHAP 1 — Informasi Game
             ================================================= -->
        <section class="card" id="tahap1">
          <div class="card-header">
            <h2 class="section-title">Tahap 1: Informasi Game</h2>
          </div>

          <div class="form-stack">

            <!-- Row 1: Game Number & Hasil -->
            <div class="grid-2">
              <div class="form-group">
                <label class="form-label" for="gameNumber">Game Number</label>
                <select class="form-select" id="gameNumber">
                  <option value="1">Game 1</option>
                  <option value="2">Game 2</option>
                  <option value="3">Game 3</option>
                  <option value="4">Game 4</option>
                  <option value="5">Game 5</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="gameResult">Hasil Pertandingan</label>
                <select class="form-select" id="gameResult">
                  <option value="win">WIN</option>
                  <option value="lose">LOSE</option>
                </select>
              </div>
            </div>

            <!-- Row 2: Kills & Deaths -->
            <div class="grid-2">
              <div class="form-group">
                <label class="form-label" for="teamKills">Total Kills Tim</label>
                <input
                  class="form-input"
                  type="number"
                  id="teamKills"
                  placeholder="0"
                  min="0"
                  required
                />
              </div>
              <div class="form-group">
                <label class="form-label" for="teamDeaths">Total Deaths Tim</label>
                <input
                  class="form-input"
                  type="number"
                  id="teamDeaths"
                  placeholder="0"
                  min="0"
                  required
                />
              </div>
            </div>

            <!-- Row 3: Durasi -->
            <div class="form-group">
              <label class="form-label">Durasi Game</label>
              <div class="inline-duration-fields">
                <input
                  class="form-input input-inline-sm"
                  type="number"
                  id="gameDurationMin"
                  placeholder="Menit"
                  min="0"
                  required
                />
                <span class="form-label">menit</span>
                <input
                  class="form-input input-inline-sm"
                  type="number"
                  id="gameDurationSec"
                  placeholder="Detik"
                  min="0"
                  max="59"
                  required
                />
                <span class="form-label">detik</span>
              </div>
            </div>

            <!-- Actions Tahap 1 -->
            <div class="form-actions">
              <button class="btn btn-primary" id="btnNextStep" type="button">
                Next
              </button>
            </div>
          </div>
        </section>

        <!-- =================================================
             TAHAP 2 — Statistik Pemain
             ================================================= -->
        <section class="card section-spaced hidden" id="tahap2">
          <div class="card-header">
            <h2 class="section-title">Tahap 2: Statistik Pemain</h2>
          </div>
          <div class="grid-3 player-grid-wrap" id="playerContainer">

            <!-- ---- Role Card: Jungler ---- -->
            <article class="role-card">
              <div class="role-head">
                <span class="role-name">Jungler</span>
                <span class="tag">Role 1</span>
              </div>
              <select class="form-select select-player" required>
                <option value="" disabled selected>Pilih Pemain</option>
              </select>
              <select class="form-select select-hero field-spacer-sm" required>
                <option value="" disabled selected>Pilih Hero</option>
              </select>
              <div class="grid-3 field-spacer-md">
                <input class="form-input input-kills"   type="number" placeholder="Kill"   required />
                <input class="form-input input-deaths"  type="number" placeholder="Death"  required />
                <input class="form-input input-assists" type="number" placeholder="Assist" required />
              </div>
              <input class="form-input input-gold field-spacer-md" type="number" placeholder="Total Gold" required />
            </article>

            <!-- ---- Role Card: Roamer ---- -->
            <article class="role-card">
              <div class="role-head">
                <span class="role-name">Roamer</span>
                <span class="tag">Role 2</span>
              </div>
              <select class="form-select select-player" required>
                <option value="" disabled selected>Pilih Pemain</option>
              </select>
              <select class="form-select select-hero field-spacer-sm" required>
                <option value="" disabled selected>Pilih Hero</option>
              </select>
              <div class="grid-3 field-spacer-md">
                <input class="form-input input-kills"   type="number" placeholder="Kill"   required />
                <input class="form-input input-deaths"  type="number" placeholder="Death"  required />
                <input class="form-input input-assists" type="number" placeholder="Assist" required />
              </div>
              <input class="form-input input-gold field-spacer-md" type="number" placeholder="Total Gold" required />
            </article>

            <!-- ---- Role Card: Mid Laner ---- -->
            <article class="role-card">
              <div class="role-head">
                <span class="role-name">Mid Laner</span>
                <span class="tag">Role 3</span>
              </div>
              <select class="form-select select-player" required>
                <option value="" disabled selected>Pilih Pemain</option>
              </select>
              <select class="form-select select-hero field-spacer-sm" required>
                <option value="" disabled selected>Pilih Hero</option>
              </select>
              <div class="grid-3 field-spacer-md">
                <input class="form-input input-kills"   type="number" placeholder="Kill"   required />
                <input class="form-input input-deaths"  type="number" placeholder="Death"  required />
                <input class="form-input input-assists" type="number" placeholder="Assist" required />
              </div>
              <input class="form-input input-gold field-spacer-md" type="number" placeholder="Total Gold" required />
            </article>

            <!-- ---- Role Card: Exp Laner ---- -->
            <article class="role-card">
              <div class="role-head">
                <span class="role-name">Exp Laner</span>
                <span class="tag">Role 4</span>
              </div>
              <select class="form-select select-player" required>
                <option value="" disabled selected>Pilih Pemain</option>
              </select>
              <select class="form-select select-hero field-spacer-sm" required>
                <option value="" disabled selected>Pilih Hero</option>
              </select>
              <div class="grid-3 field-spacer-md">
                <input class="form-input input-kills"   type="number" placeholder="Kill"   required />
                <input class="form-input input-deaths"  type="number" placeholder="Death"  required />
                <input class="form-input input-assists" type="number" placeholder="Assist" required />
              </div>
              <input class="form-input input-gold field-spacer-md" type="number" placeholder="Total Gold" required />
            </article>
            
            <!-- ---- Role Card: Gold Laner ---- -->
            <article class="role-card">
              <div class="role-head">
                <span class="role-name">Gold Laner</span>
                <span class="tag">Role 5</span>
              </div>
              <select class="form-select select-player" required>
                <option value="" disabled selected>Pilih Pemain</option>
              </select>
              <select class="form-select select-hero field-spacer-sm" required>
                <option value="" disabled selected>Pilih Hero</option>
              </select>
              <div class="grid-3 field-spacer-md">
                <input class="form-input input-kills"   type="number" placeholder="Kill"   required />
                <input class="form-input input-deaths"  type="number" placeholder="Death"  required />
                <input class="form-input input-assists" type="number" placeholder="Assist" required />
              </div>
              <input class="form-input input-gold field-spacer-md" type="number" placeholder="Total Gold" required />
            </article>
          </div><!-- /.grid-3 #playerContainer -->
          <div class="step-actions">
            <button class="btn btn-secondary" id="btnBackStep" type="button">
              Kembali ke Tahap 1
            </button>
            <button class="btn btn-primary" id="btnSubmitAll" type="button">
              Simpan Game
            </button>
          </div>

        </section><!-- /#tahap2 -->

      </main><!-- /.page-content -->
    </div><!-- /.main-wrapper -->
  </div><!-- /.app-layout -->

  <script>
    /* Theme init — dijalankan sebelum render untuk mencegah flash */
    (function () {
      var d    = document.documentElement;
      var pref = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
      d.setAttribute('data-theme', pref);
    }());

    function updateIcon(theme) {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.innerHTML = theme === 'dark'
        ? '<svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.75">ircle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.75"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }

    window.toggleTheme = function () {
      var d    = document.documentElement;
      var curr = d.getAttribute('data-theme') || 'light';
      var next = curr === 'dark' ? 'light' : 'dark';
      d.setAttribute('data-theme', next);
      updateIcon(next);
    };

    window.addEventListener('DOMContentLoaded', function () {
      updateIcon(document.documentElement.getAttribute('data-theme'));
    });

    /* Global Toast */
    function showToast(msg, type) {
      type = type || 'success';
      var c = document.getElementById('toastContainer');
      if (!c) return;
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      t.innerHTML =
        '<span class="toast-icon"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">' +
        (type === 'success'
          ? '<polyline points="20 6 9 17 4 12"/>'
          : 'ircle cx="12" cy="12" r="10"/>e x1="15" y1="9" x2="9" y2="15"/>e x1="9" y1="9" x2="15" y2="15"/>') +
        '</svg></span>' +
        '<span class="toast-msg">' + msg + '</span>' +
        '<button class="toast-close" onclick="this.parentElement.remove()" type="button" aria-label="Tutup">&times;</button>';
      c.appendChild(t);
      setTimeout(function () { t.classList.add('show'); }, 10);
      setTimeout(function () {
        t.classList.remove('show');
        setTimeout(function () { t.remove(); }, 300);
      }, 3000);
    }

    /* Sidebar toggle (mobile) */
    window.addEventListener('DOMContentLoaded', function () {
      var toggle  = document.getElementById('menuToggle');
      var sidebar = document.getElementById('sidebar');
      var overlay = document.getElementById('sidebarOverlay');

      if (toggle) {
        toggle.addEventListener('click', function () {
          sidebar.classList.toggle('open');
          overlay.classList.toggle('show');
        });
      }

      if (overlay) {
        overlay.addEventListener('click', function () {
          sidebar.classList.remove('open');
          overlay.classList.remove('show');
        });
      }

      /* Mark active nav item */
      var path = window.location.pathname.split('/').pop();
      document.querySelectorAll('.nav-item[data-page]').forEach(function (el) {
        if (el.dataset.page === path) el.classList.add('active');
      });
    });
  </script>

  <script src="js/config.js"></script>
  <script src="js/addgame.js"></script>

</body>
</html>
