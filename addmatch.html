<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tambah Match — Esport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>

  <script src="js/global.js" defer></script>
  <script src="js/addmatch.js" defer></script>
</head>
<body>
<div class="app-layout">

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
          <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
          <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
        </svg>
      </div>
      <div>
        <div class="sidebar-logo-text">Esport</div>
        <div class="sidebar-logo-sub">MLBB Manager</div>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a href="index.html" class="nav-item" data-page="index.html">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Dashboard
      </a>
      <a href="competition.html" class="nav-item" data-page="competition.html">
        <svg viewBox="0 0 24 24">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
          <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
          <path d="M4 22h16"/>
          <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
          <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
          <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
        </svg>
        Competition
      </a>
      <a href="match.html" class="nav-item" data-page="match.html">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Match
      </a>
      <a href="train.html" class="nav-item" data-page="train.html">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Train
      </a>
      <a href="team.html" class="nav-item" data-page="team.html">
        <svg viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Tim
      </a>
    </div>

    <div class="sidebar-footer">
      <button
        class="theme-toggle"
        id="themeToggle"
        aria-label="Toggle theme"
      >
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-breadcrumb">
        <button id="menuToggle" class="menu-toggle" type="button" aria-label="Buka menu">
          <svg viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span>Match</span>
        <span class="sep">/</span>
        <span class="current">Tambah Match</span>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Tambah Match</h1>
          <p class="page-sub">Catat pertandingan baru tim</p>
        </div>
        <a href="match.html" class="btn btn-secondary">
          <svg viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Kembali
        </a>
      </div>

      <div class="card form-card">
        <form id="addMatchForm">
          <div class="form-section">
            <div class="form-section-title">Detail Match</div>

            
              <div class="form-group">
                <label class="form-label">Kategori Match</label>
                <div class="radio-group">
                  <label class="radio-item">
                    <input type="radio" name="type" value="tournament"/>
                    <span>Tournament</span>
                  </label>
                  <label class="radio-item">
                    <input type="radio" name="type" value="league"/>
                    <span>League</span>
                  </label>
                  <label class="radio-item">
                    <input type="radio" name="type" value="scrim"/>
                    <span>Scrim</span>
                  </label>
                  <label class="radio-item">
                    <input type="radio" name="type" value="ranked"/>
                    <span>Ranked</span>
                  </label>
                </div>
              </div>

              <div class="form-group hidden" id="eventGroup">
                <label class="form-label" for="eventSelect">Pilih Event</label>
                <select class="form-select" id="eventSelect" name="event">
                  <option value="">Pilih Tournament/League</option>                  
                </select>
              </div>

              <div class="form-group hidden" id="formatGroup">
                <label class="form-label" for="matchFormat">Format Match</label>
                <select class="form-select" id="matchFormat" name="matchFormat">
                  <option value="BO1">Best of 1</option>
                  <option value="BO2">Best of 2</option>
                  <option value="BO3" selected>Best of 3</option>
                  <option value="BO4">Best of 4</option>
                  <option value="BO5">Best of 5</option>
                  <option value="BO7">Best of 7</option>
                </select>
              </div>
            

            <div class="form-group hidden" id="opponentGroup">
              <label class="form-label" id="opponentName">Nama Lawan</label>
              <input
                class="form-input"
                type="text"
                id="opponentName"
                name="opponentName"
                placeholder="Contoh: RRQ Hoshi"                
              />
            </div>

            <div class="form-grid-2 hidden" id="datetimeGroup">
              <div class="form-group hidden" id="dateGroup">
                <label class="form-label" id="matchDate" name="matchDate">Tanggal Match</label>
                <input class="form-input" type="date" id="matchDate" name="matchDate"/>
              </div>
              <div class="form-group hidden" id="timeGroup">
                <label class="form-label" id="matchTime" name="matchTime">Jam Match</label>
                <input class="form-input" type="time" id="matchTime" name="matchTime"/>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">
              <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Simpan Match
            </button>
            <a href="match.html" class="btn btn-ghost">Batal</a>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
</body>
</html>
